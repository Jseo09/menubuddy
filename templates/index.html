<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuBuddy AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #444444; /* Dark grey background */
            color: #ffffff; /* White text */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .main-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 20px;
        }
        .input-column {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .log-column {
            flex: 1;
            background-color: #333333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #555555;
        }
        h2 { font-size: 20px; font-weight: bold; margin: 0; padding-top: 10px; }
        h3 { font-size: 16px; margin: 0; }

        input[type="text"] {
            width: calc(100% - 20px);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #cccccc;
            background-color: #ffffff;
            color: #333333;
        }
        button {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid #cccccc;
            background-color: #ffffff;
            color: #333333;
            cursor: pointer;
            width: fit-content;
        }
        button:hover { background-color: #f0f0f0; }

        .file-input-wrapper {
            border: 1px solid #999999;
            background-color: #555555;
            padding: 5px;
            border-radius: 4px;
            width: calc(100% - 10px);
        }

        .response-display {
            width: calc(100% - 20px);
            height: 100px;
            background-color: #f8f8f8;
            border: 1px solid #cccccc;
            border-radius: 4px;
            padding: 10px;
            color: #333333;
            font-size: 14px;
            overflow-y: auto;
        }

        #logWindow {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
            color: #bbbbbb;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="main-container">

    <div class="input-column">

        <h2>Add Menu from URL</h2>
        <input id="urlInput" type="text" placeholder="Enter Menu URL">
        <button onclick="importUrl()">Add Menu</button>

        <h2>Add Menu from Image</h2>
        <div class="file-input-wrapper">
            <input id="imageInput" type="file">
        </div>
        <button onclick="importImage()">Upload Image</button>

        <h2>Ask a Question</h2>
        <input id="queryInput" type="text" placeholder="Type your question...">
        <button onclick="askQuestion()">Ask</button>

        <h3>Response:</h3>
        <div id="responseDisplay" class="response-display">Your answers will appear here...</div>

    </div>

    <div class="log-column">
        <h3>Process Log</h3>
        <div id="logWindow">System ready.</div>
    </div>

</div>

<script>
    function addLog(msg) {
        const log = document.getElementById('logWindow');
        const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });
        log.innerHTML += `<p style="margin:2px 0;">[${timestamp}] ${msg}</p>`;
        log.scrollTop = log.scrollHeight;
    }

    async function importUrl() {
        const urlInput = document.getElementById('urlInput');
        const url = urlInput.value;
        if (!url) return;

        addLog(`Importing from URL...`);
        try {
            const res = await fetch('/import_menu', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url })
            });
            const data = await res.json();
            addLog(`SUCCESS: ${data.message}`);
            urlInput.value = ''; // Clear input
        } catch (error) { addLog(`ERROR: ${error}`); }
    }

    async function importImage() {
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) return alert("Please choose a file first.");

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        addLog(`Processing Image with OCR...`);

        try {
            const res = await fetch('/import_menu', { method: 'POST', body: formData });
            const data = await res.json();
            addLog(`SUCCESS: Menu added to Vector DB`);
            fileInput.value = ''; // Clear input
        } catch (error) { addLog(`ERROR: ${error}`); }
    }

    async function askQuestion() {
        const queryInput = document.getElementById('queryInput');
        const question = queryInput.value;
        if (!question) return;

        const responseDisplay = document.getElementById('responseDisplay');
        responseDisplay.textContent = 'Thinking...'; // Loading state

        addLog(`RETRIEVAL -> Querying ChromaDB`);
        addLog(`GENERATION -> Synthesizing Answer`);

        try {
            const res = await fetch('/ask_menu', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            addLog(`VALIDATION -> ${data.verification}`);

            responseDisplay.textContent = data.answer; // Update response area
            queryInput.value = ''; // Clear input
        } catch (error) {
            addLog(`ERROR: ${error}`);
            responseDisplay.textContent = 'An error occurred. Check logs.';
        }
    }
</script>

</body>
</html>
