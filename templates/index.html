<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuBuddy AI v3.1</title>
    <style>
        :root {
            --bg-dark: #2b2b2b;
            --panel-dark: #1e1e1e;
            --accent-orange: #ff9800;
            --accent-red: #f44336;
            --citation-blue: #2196f3;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .main-container { width: 100%; max-width: 1000px; display: flex; gap: 20px; }
        .input-column { flex: 2; display: flex; flex-direction: column; gap: 15px; }

        .log-column {
            flex: 1; background-color: var(--panel-dark); border-radius: 8px;
            padding: 15px; display: flex; flex-direction: column;
            border: 1px solid #444; max-height: 90vh;
        }

        h2 { font-size: 18px; font-weight: bold; margin: 0; color: #ffffff; }
        h3 { font-size: 14px; margin: 0; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        input[type="text"] {
            width: calc(100% - 22px); padding: 12px;
            border-radius: 4px; border: 1px solid #444;
            background-color: #333; color: white;
        }

        button {
            padding: 10px 20px; border-radius: 4px;
            border: 1px solid #ffffff;
            background-color: #ffffff; /* White background */
            color: #000000;            /* Black text */
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background-color: #e0e0e0; transform: translateY(-1px); }

        .response-display {
            width: calc(100% - 24px); min-height: 120px;
            background-color: #ffffff; border-radius: 6px;
            padding: 15px; color: #1a1a1a; font-size: 15px;
            line-height: 1.6; border-left: 8px solid #888;
        }
        .response-display.verified { border-left-color: #4caf50; }
        .response-display.flagged { border-left-color: var(--accent-orange); }
        .response-display.refused { border-left-color: var(--accent-red); background-color: #fff0f0; }

        .citation-badge {
            background-color: var(--citation-blue); color: white;
            padding: 2px 6px; border-radius: 4px; font-size: 11px;
            font-weight: bold; margin: 0 2px; display: inline-block;
        }

        #logWindow {
            flex: 1; font-family: 'Consolas', monospace; font-size: 11px;
            color: #aaa; overflow-y: auto; margin-top: 10px;
            border-top: 1px solid #333; padding-top: 10px;
        }
        .status-tag { font-weight: bold; font-size: 12px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="input-column">
        <h2>Import Menu Source</h2>
        <input id="urlInput" type="text" placeholder="https://menu-link.com">
        <button onclick="importUrl()">Add URL</button>
        <div style="background: #333; padding: 10px; border-radius: 4px; border: 1px dashed #555;">
            <input id="imageInput" type="file">
        </div>
        <button onclick="importImage()">Upload Image/QR</button>
        <h2>Query Pipeline</h2>
        <input id="queryInput" type="text" placeholder="Ask about items or prices...">
        <button onclick="askQuestion()">Execute RAG Query</button>
        <h3>MenuBuddy Output</h3>
        <div id="responseDisplay" class="response-display">Waiting for user input...</div>
    </div>
    <div class="log-column">
        <h3>Pipeline Trace</h3>
        <div id="logWindow"></div>
    </div>
</div>
<script>
    function addLog(msg, color = "#bbbbbb") {
        const log = document.getElementById('logWindow');
        const timestamp = new Date().toLocaleTimeString([], { hour12: false });
        log.innerHTML += `<div style="margin:5px 0; color: ${color}; border-left: 2px solid ${color}; padding-left: 5px;">[${timestamp}] ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function importUrl() {
        const url = document.getElementById('urlInput').value;
        if (!url) return;
        addLog(`INGESTION -> URL: ${url}`);
        const res = await fetch('/import_menu', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ url }) });
        const data = await res.json();
        addLog(`SUCCESS: ${data.message}`, "#4caf50");
    }

    async function importImage() {
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) return;
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        addLog(`INGESTION -> Image Buffer...`);
        const res = await fetch('/import_menu', { method: 'POST', body: formData });
        const data = await res.json();
        addLog(`SUCCESS: ${data.message}`, "#4caf50");
    }

    async function askQuestion() {
        const query = document.getElementById('queryInput').value;
        const display = document.getElementById('responseDisplay');
        if (!query) return;
        display.innerHTML = '<em>Thinking...</em>';
        display.className = "response-display";
        const res = await fetch('/ask_menu', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ question: query }) });
        const data = await res.json();

        if (data.status === "VERIFIED") display.classList.add('verified');
        else if (data.status.includes("FLAGGED")) display.classList.add('flagged');

        const formattedAnswer = data.answer.replace(/\[(\d+)\]/g, '<span class="citation-badge">[$1]</span>');
        display.innerHTML = `<span class="status-tag">${data.status}</span>${formattedAnswer}<br><br><small style="color:#999;">${data.details}</small>`;
        addLog(data.verification.replace(/\n/g, '<br>'), "#666");
    }
</script>
</body>
</html>
